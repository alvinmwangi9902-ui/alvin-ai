<!DOCTYPE html>
<html>
<head><title>ALVIN AI</title></head>
<body>
    <h1>ALVIN</h1>
    <div class="buttons">
        <button onclick="askAI('gemini')">Ask Gemini</button>
        <button onclick="askAI('groq')">Ask Groq</button>
    </div>
    <div id="chat-area" style="border: 1px solid #ccc; height: 300px; overflow-y: scroll; padding: 10px;"></div>
    <input type="text" id="user-input" placeholder="Type here...">
    <script>
        async function askAI(mode) {
            const prompt = document.getElementById('user-input').value;
            const chatArea = document.getElementById('chat-area');
            chatArea.innerHTML += `<p><b>You:</b> ${prompt}</p>`;
            
            try {
                const response = await fetch('/.netlify/functions/ask-ai', {
                    method: 'POST',
                    body: JSON.stringify({ prompt, mode })
                });
                const data = await response.json();
                chatArea.innerHTML += `<p><b>ALVIN (${mode}):</b> ${data.message}</p>`;
            } catch (e) {
                chatArea.innerHTML += `<p style="color:red;">Error connecting to AI bridge.</p>`;
            }
        }
    </script>
</body>
</html>
